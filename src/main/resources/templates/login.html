<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 로그인 - Munni</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-box">
        <div class="text-center mb-3">
            <img th:src="@{/images/logo.jpg}" alt="MUNNI" style="height:80px; width:auto;">
        </div>
        <p class="text-center text-muted mb-4" style="font-size:0.9rem;">관리자 로그인</p>

        <div class="alert alert-danger" th:if="${param.error}" role="alert">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label" style="font-size:0.9rem;">아이디</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label" style="font-size:0.9rem;">비밀번호</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-gold btn">로그인</button>
        </form>

        <div class="text-center mt-3">
            <a href="/" style="font-size:0.85rem; color:#aaa; text-decoration:none;">← 쇼핑몰로 돌아가기</a>
        </div>
    </div>
</div>
</body>
</html>
