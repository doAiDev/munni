<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 대시보드 - Munni</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background:#f8f4f0;">

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">✦ MUNNI</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <a href="/" class="nav-link"><i class="bi bi-house"></i> 사이트 보기</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm btn-outline-secondary">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="admin-container">
    <div class="admin-card mb-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-grid-fill me-2"></i>상품 관리</h2>
            <a href="/admin/upload" class="btn btn-sm btn-primary-custom" style="background:#c9a96e; color:#fff; border:none; padding:8px 20px; border-radius:20px; text-decoration:none;">
                <i class="bi bi-plus-lg"></i> 상품 등록
            </a>
        </div>

        <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

        <div th:if="${products.empty}" class="text-center py-4 text-muted">
            <i class="bi bi-inbox" style="font-size:2rem;"></i>
            <p class="mt-2">등록된 상품이 없습니다.</p>
        </div>

        <div class="table-responsive" th:unless="${products.empty}">
            <table class="table table-hover align-middle">
                <thead style="background:#fdf6ee;">
                    <tr>
                        <th style="width:70px;">이미지</th>
                        <th>상품명</th>
                        <th>카테고리</th>
                        <th>가격</th>
                        <th>설명</th>
                        <th style="width:80px;">삭제</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td>
                            <img th:if="${p.imagePath}" th:src="${p.imagePath}" th:alt="${p.name}"
                                 style="width:56px; height:56px; object-fit:cover; border-radius:8px;">
                            <div th:unless="${p.imagePath}"
                                 style="width:56px; height:56px; background:#f0e0cc; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#bbb;">
                                <i class="bi bi-image"></i>
                            </div>
                        </td>
                        <td th:text="${p.name}"></td>
                        <td><span class="category-badge" th:text="${p.category.label}"></span></td>
                        <td th:text="${p.price}"></td>
                        <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#999; font-size:0.85rem;" th:text="${p.description}"></td>
                        <td>
                            <form th:action="@{/admin/delete/{id}(id=${p.id})}" method="post"
                                  onsubmit="return confirm('삭제하시겠습니까?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
