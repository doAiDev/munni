<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Munni - 악세사리 쇼핑몰</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand p-0" href="/"><img th:src="@{/images/logo.png}" alt="MUNNI" style="height:44px; width:auto;"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <li class="nav-item"><a class="nav-link" href="/">홈</a></li>
                <li class="nav-item"><a class="nav-link" href="/gallery">갤러리</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">연락처</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/admin/dashboard"><i class="bi bi-grid"></i> 관리</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">로그아웃</button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-sm" style="border:1px solid #c9a96e; color:#c9a96e;" href="/login">관리자</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="container">
        <h1>✦ MUNNI</h1>
        <p>당신의 일상에 작은 빛을 더하는<br>감각적인 핸드메이드 악세사리</p>
        <a href="/gallery" class="btn-primary-custom">컬렉션 보기</a>
    </div>
</section>

<!-- LATEST PRODUCTS -->
<section class="container my-5">
    <h3 class="text-center mb-4" style="font-family:'Playfair Display',serif; color:#a8845a;">New Arrivals</h3>

    <!-- Category filter -->
    <div class="category-tabs">
        <a href="/gallery" class="category-tab">전체</a>
        <a th:each="cat : ${categories}"
           th:href="@{/gallery(category=${cat.name()})}"
           th:text="${cat.label}"
           class="category-tab">카테고리</a>
    </div>

    <!-- Grid -->
    <div class="product-grid" th:if="${!products.empty}">
        <div class="product-card" th:each="p : ${products}">
            <img th:if="${p.imagePath}" th:src="${p.imagePath}" th:alt="${p.name}">
            <div class="no-img" th:unless="${p.imagePath}"><i class="bi bi-image"></i></div>
            <div class="card-body">
                <span class="category-badge" th:text="${p.category.label}">카테고리</span>
                <h5 th:text="${p.name}">상품명</h5>
                <div class="price" th:text="${p.price}" th:if="${p.price}">가격</div>
                <div class="desc" th:text="${p.description}" th:if="${p.description}">설명</div>
            </div>
        </div>
    </div>
    <div class="text-center py-5 text-muted" th:if="${products.empty}">
        <i class="bi bi-gem" style="font-size:3rem; color:#e8d5c4;"></i>
        <p class="mt-3">등록된 상품이 없습니다.</p>
    </div>
</section>

<!-- CONTACT -->
<section class="contact-section" id="contact">
    <div class="container">
        <h2>Contact & SNS</h2>
        <p class="text-muted mb-4">주문 문의 및 최신 소식은 아래 채널을 이용해 주세요</p>
        <div class="social-links">
            <a href="https://www.instagram.com/munni__jewelry" target="_blank" class="social-link">
                <i class="bi bi-instagram" style="font-size:1.2rem;"></i> Instagram
            </a>
        </div>
    </div>
</section>

<footer>
    <p>© 2025 MUNNI. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
