<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>갤러리 - Munni</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">✦ MUNNI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <li class="nav-item"><a class="nav-link" href="/">홈</a></li>
                <li class="nav-item"><a class="nav-link active" href="/gallery">갤러리</a></li>
                <li class="nav-item"><a class="nav-link" href="/#contact">연락처</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/admin/dashboard"><i class="bi bi-grid"></i> 관리</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">로그아웃</button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-sm" style="border:1px solid #c9a96e; color:#c9a96e;" href="/login">관리자</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-1" style="font-family:'Playfair Display',serif; color:#a8845a;">Collection</h2>
    <p class="text-center text-muted mb-4">MUNNI의 모든 악세사리를 만나보세요</p>

    <!-- Category Tabs -->
    <div class="category-tabs">
        <a href="/gallery" th:classappend="${selectedCategory == null ? ' active' : ''}" class="category-tab">전체</a>
        <a th:each="cat : ${categories}"
           th:href="@{/gallery(category=${cat.name()})}"
           th:text="${cat.label}"
           th:classappend="${selectedCategory == cat ? ' active' : ''}"
           class="category-tab">카테고리</a>
    </div>

    <!-- Product Grid -->
    <div class="product-grid" th:if="${!products.empty}">
        <div class="product-card" th:each="p : ${products}">
            <!-- 이미지 클릭 시 모달 -->
            <img th:if="${p.imagePath}"
                 th:src="${p.imagePath}"
                 th:alt="${p.name}"
                 data-bs-toggle="modal"
                 data-bs-target="#imgModal"
                 th:data-bs-img="${p.imagePath}"
                 th:data-bs-name="${p.name}"
                 style="cursor:pointer;">
            <div class="no-img" th:unless="${p.imagePath}"><i class="bi bi-image"></i></div>
            <div class="card-body">
                <span class="category-badge" th:text="${p.category.label}">카테고리</span>
                <h5 th:text="${p.name}">상품명</h5>
                <div class="price" th:text="${p.price}" th:if="${p.price}">가격</div>
                <div class="desc" th:text="${p.description}" th:if="${p.description}">설명</div>
            </div>
        </div>
    </div>

    <div class="text-center py-5 text-muted" th:if="${products.empty}">
        <i class="bi bi-gem" style="font-size:3rem; color:#e8d5c4;"></i>
        <p class="mt-3">해당 카테고리에 상품이 없습니다.</p>
    </div>
</div>

<!-- Image Modal -->
<div class="modal fade" id="imgModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center p-2">
                <img id="modalImg" src="" alt="" style="max-width:100%; border-radius:8px;">
            </div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 MUNNI. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = document.getElementById('imgModal');
    modal.addEventListener('show.bs.modal', e => {
        const btn = e.relatedTarget;
        document.getElementById('modalImg').src = btn.getAttribute('data-bs-img');
        document.getElementById('modalTitle').textContent = btn.getAttribute('data-bs-name');
    });
</script>
</body>
</html>
